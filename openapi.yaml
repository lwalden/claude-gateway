openapi: 3.1.0
info:
  title: claude-gateway
  version: 0.1.0
  description: |
    HTTP gateway to Claude. Each `POST /ask` is tried against the local Claude
    CLI first (uses the host's Claude subscription, no per-token cost) and falls
    back to the Anthropic API when the CLI is unavailable, times out, or returns
    empty. The gateway is a stateless thin proxy: every request is independent
    and there is no conversation history or session management — the caller owns
    any multi-turn context.

    ## Authentication
    `POST /ask` requires `Authorization: Bearer <GATEWAY_API_KEY>`, a single
    shared secret compared in constant time. The two `/health*` routes are
    unauthenticated.

    Rotating the secret means restarting the server with a new `GATEWAY_API_KEY`
    — there is no multi-key or versioned-secret support, so plan rotation as a
    brief restart.

    Send the bearer token only over TLS once off localhost. The `servers` entry
    below uses plain `http` for local use; any non-loopback deployment must
    terminate HTTPS in front of the gateway or the shared secret travels in
    cleartext. `GET /health/cli` is unauthenticated and reports subscription
    credential expiry timing — restrict it to trusted callers (firewall / private
    network) rather than exposing it publicly.

    ## Request limits
    - JSON request body is capped at **1 MB** (`413` from the framework if exceeded).
    - `prompt` and `system` are each capped at 100,000 characters; `model` at 256.

    ## Response `source`/`model`
    - `source: "cli"` → served by the local CLI; `model` is the literal string
      `"subscription"` (the subscription decides the underlying model).
    - `source: "api"` → served by the Anthropic API; `model` is the resolved
      model id (the request's `model`, or the server's `ANTHROPIC_MODEL` default).

    ## Known constraints (see DECISIONS.md)
    - `max_tokens` is fixed server-side (8192 on the API path) and is **not**
      caller-configurable.
    - No request/response streaming.
    - No API versioning header or `/version` route yet — pin to this `info.version`.
    - The CLI path has a server-side timeout (~30 s by default, `CLI_TIMEOUT_MS`).
      Set your HTTP client timeout to at least 35 s to avoid spurious failures.
    - No server-side rate limiting — callers must throttle themselves. Retrying on
      `502` re-attempts the same paid fallback, so back off rather than hammering.
    - When deployed with `CONTAINER_MODE=true` the CLI path is skipped entirely and
      **every** request hits the paid Anthropic API (`source` is always `"api"`).
      Subscription cost-isolation is lost in that mode.

servers:
  - url: http://localhost:3131
    description: Local default (PORT defaults to 3131). Replace with your gateway's base URL; use https off localhost.

tags:
  - name: ask
    description: Claude invocation
  - name: health
    description: Unauthenticated health and credential checks

paths:
  /ask:
    post:
      tags: [ask]
      summary: Ask Claude a question
      description: |
        Sends `prompt` (and optional `system`, `model`, `jsonSchema`) to Claude
        via the CLI-first / API-fallback path. The `prompt` is trimmed before use.
      operationId: ask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
            examples:
              minimal:
                summary: Minimal request
                value:
                  prompt: "Summarize the CAP theorem in one sentence."
              withSystem:
                summary: With a system prompt and explicit model
                value:
                  prompt: "List three risks."
                  system: "You are a terse risk analyst. Reply as a bulleted list."
                  model: "claude-opus-4-6"
              structured:
                summary: Structured output via JSON Schema
                value:
                  prompt: "Extract the name and age from: Dana is 31."
                  jsonSchema:
                    type: object
                    properties:
                      name: { type: string }
                      age: { type: integer }
                    required: [name, age]
      responses:
        '200':
          description: Claude responded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'
              examples:
                cli:
                  summary: Served by the local CLI
                  value:
                    response: "The CAP theorem states a distributed store can guarantee only two of consistency, availability, and partition tolerance."
                    source: "cli"
                    model: "subscription"
                    durationMs: 1840
                api:
                  summary: Served by the Anthropic API fallback
                  value:
                    response: "Three risks: regulatory exposure, vendor lock-in, and data latency."
                    source: "api"
                    model: "claude-opus-4-6"
                    durationMs: 2210
                structured:
                  summary: Structured output — `response` is a JSON *string* the caller must parse
                  value:
                    response: "{\"name\":\"Dana\",\"age\":31}"
                    source: "cli"
                    model: "subscription"
                    durationMs: 1920
        '400':
          description: |
            Validation failed. The `error` message names the offending field, e.g.
            `prompt is required and must be a non-empty string`, or
            `prompt exceeds maximum length of 100000 characters`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Unauthorized"
        '413':
          description: |
            Request body exceeded the 1 MB limit. Returned by the Express body
            parser through its default error handler — the body is a plain-text /
            HTML framework error, **not** the JSON `Error` envelope used by the
            other error responses. Do not parse it as JSON.
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Server misconfiguration — `GATEWAY_API_KEY` is not set on the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "GATEWAY_API_KEY is not set on the server"
        '502':
          description: |
            Upstream failure — the CLI path produced nothing and the API fallback
            failed, is disabled, or has no key. Error bodies are sanitized; callers
            never receive internal detail. Observed messages:
            `CLI unavailable and ANTHROPIC_API_KEY is not set`,
            `CLI unavailable and API fallback is disabled`,
            `CLI returned empty response`, `API returned empty response`, or — when
            the Anthropic API itself returns a non-2xx — `Upstream API error
            (status <N>)` carrying the upstream HTTP status (the raw upstream body is
            logged server-side, never returned to the caller).

            Do not retry immediately: a retry re-attempts the same paid fallback and,
            if the cause was an upstream 429, will likely 429 again — use exponential
            back-off.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskError'
        '404':
          description: |
            Route not found. The gateway's catch-all returns this JSON shape for any
            unregistered path or method (e.g. a `GET /ask`). All unmatched routes
            across the service respond with this same envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Not Found"

  /health:
    get:
      tags: [health]
      summary: Liveness check
      operationId: health
      responses:
        '200':
          description: Service is up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                service: claude-gateway

  /health/cli:
    get:
      tags: [health]
      summary: Claude CLI credential expiry check
      description: |
        Reports how long the host's Claude CLI OAuth credentials remain valid.
        Useful for alerting before the subscription path silently starts failing
        over to the API. Unauthenticated — keep it off the public internet.
      operationId: healthCli
      responses:
        '200':
          description: |
            Credential status. Returns either a known status with timing fields, or
            `unknown` with a reason when credentials can't be read or parsed.
            `status` is `expiring` when fewer than 2 hours remain and `expired` at
            or past expiry.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CliHealthKnown'
                  - $ref: '#/components/schemas/CliHealthUnknown'
              examples:
                ok:
                  value:
                    status: ok
                    expiresAt: 1771027200000
                    hoursRemaining: 71.5
                expiring:
                  value:
                    status: expiring
                    expiresAt: 1764547200000
                    hoursRemaining: 1.4
                unknown:
                  value:
                    status: unknown
                    reason: "could not read credentials file"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Shared secret. Send `Authorization: Bearer <GATEWAY_API_KEY>`. Use TLS off localhost.'

  schemas:
    AskRequest:
      type: object
      # The server reads only prompt/system/model/jsonSchema and silently IGNORES
      # any other fields — it does not reject them. Do not rely on strict rejection
      # of extra properties.
      additionalProperties: true
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 100000
          description: The user prompt. Required, non-empty after trimming.
        system:
          type: string
          maxLength: 100000
          description: Optional system prompt.
        model:
          type: string
          maxLength: 256
          description: |
            Optional model id override. Defaults to the server's `ANTHROPIC_MODEL`.
            Applies only to the API fallback path: when `source` is `cli` this field
            is ignored and the subscription decides the model. On the API path it
            selects the billed model, so a more expensive model id means higher cost.
        jsonSchema:
          type: object
          description: |
            Optional JSON Schema enforcing structured output. When provided, the
            `response` field contains the JSON-stringified structured result.

    AskResponse:
      type: object
      required: [response, source, model, durationMs]
      properties:
        response:
          type: string
          description: |
            Claude's reply. When `jsonSchema` was supplied, this is a JSON *string*
            conforming to that schema (the caller must `JSON.parse` it); otherwise
            plain text.
        source:
          type: string
          enum: [cli, api]
          description: Which path served the request.
        model:
          type: string
          description: '`"subscription"` when source is `cli`; the resolved model id when source is `api`.'
        durationMs:
          type: integer
          description: Server-measured handling time in milliseconds.

    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          const: ok
        service:
          type: string
          const: claude-gateway

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AskError:
      type: object
      description: |
        Error envelope for `502` responses. Same shape as `Error` but adds
        `durationMs`, so a caller can tell a slow-then-failed attempt from an
        immediate rejection.
      required: [error, durationMs]
      properties:
        error:
          type: string
          description: Sanitized, caller-safe error message.
        durationMs:
          type: integer

    CliHealthKnown:
      type: object
      required: [status, expiresAt, hoursRemaining]
      properties:
        status:
          type: string
          enum: [ok, expiring, expired]
          description: '`expiring` when under 2 hours remain; `expired` at or past expiry.'
        expiresAt:
          type: integer
          description: Credential expiry as a Unix epoch timestamp in milliseconds.
        hoursRemaining:
          type: number
          description: Hours until expiry, rounded to one decimal (may be negative if expired).

    CliHealthUnknown:
      type: object
      required: [status, reason]
      properties:
        status:
          type: string
          const: unknown
        reason:
          type: string
          description: Why the status could not be determined.
